name: Automate Preprocessing

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'dataset/loan_data.csv'
      - 'automate_PutuAdiWidyantara.py'
  workflow_dispatch: # Mengizinkan kita menjalankan workflow secara manual dari tombol di GitHub

permissions:
  contents: write # Memberikan akses agar bot bisa push file baru

jobs:
  run-preprocessing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn

      - name: Run Automation Script
        run: python automate_PutuAdiWidyantara.py

      - name: Commit and Push Processed Data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add dataset/loan_data_pre.csv
          # Baris di bawah ini memastikan workflow tidak error jika tidak ada perubahan data
          git commit -m "Auto-update: Generate data preprocessing hasil bot" || echo "No changes to commit"
          git push
